<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.bunny.net/css?family=playfair-display:400,400i,700|be-vietnam-pro:300,400,500,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>SweetHeart</title>
</head>
<body>

<!-- Animated Background -->
<div class="bg"></div>
<div class="hearts-container" id="heartsContainer"></div>

<!-- ── Canvas + Heart (ngoài screen, luôn fixed) ── -->
<div class="glow" id="glow"></div>
<canvas id="pinkboard"></canvas>

<div class="ripple-container">
  <div class="ripple" id="r1"></div>
  <div class="ripple" id="r2"></div>
  <div class="ripple" id="r3"></div>
</div>

<div class="heart-wrap" id="heartWrap">
  <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="hg" cx="38%" cy="32%" r="68%">
        <stop offset="0%"   stop-color="#ffcce0"/>
        <stop offset="35%"  stop-color="#e8547a"/>
        <stop offset="100%" stop-color="#7a0a30"/>
      </radialGradient>
      <radialGradient id="shine" cx="33%" cy="28%" r="40%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.38)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
    </defs>
    <path d="M50 83 C50 83 5 52 5 26 C5 12 16 3 29 3 C38 3 46 9 50 18 C54 9 62 3 71 3 C84 3 95 12 95 26 C95 52 50 83 50 83Z" fill="url(#hg)"/>
    <path d="M50 83 C50 83 5 52 5 26 C5 12 16 3 29 3 C38 3 46 9 50 18 C54 9 62 3 71 3 C84 3 95 12 95 26 C95 52 50 83 50 83Z" fill="url(#shine)"/>
  </svg>
</div>

<!-- ── SCREEN 1: Verify ── -->
<div class="screen" id="screen1">
  <div class="modal">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <h2>Xác nhận thông tin</h2>
    <p class="subtitle">Để chắc chắn đây là em đó nhé... 🤍</p>

    <div class="field-group">
      <label>Ngày sinh của em</label>
      <input type="text" id="dob-em" placeholder="DD/MM/YYYY" oninput="formatDate(this)">
    </div>
    <div class="field-group">
      <label>Ngày sinh của anh</label>
      <input type="text" id="dob-anh" placeholder="DD/MM/YYYY" oninput="formatDate(this)">
    </div>
    <div class="sound-check">
      <input type="checkbox" id="sound-confirm" onchange="checkEnableButton()">
      <label for="sound-confirm">🔊 Mình đã bật loa rồi</label>
  </div>
    <div id="dialog" class="dialog"></div>
    <button id="btn-primary" class="btn-primary" onclick="validate()" disabled>OK</button>

    <p class="modal-footer">Chỉ người đặc biệt mới biết thông tin này thôi 😊</p>
  </div>
</div>

<!-- ── SCREEN 2: Confession ── -->
<div class="screen" id="screen2">
  <div class="confession">
    <h1>Em ơi...</h1>
    <p class="tagline">Có những điều anh muốn nói với em từ rất lâu rồi</p>
    
  </div>
</div>

<!-- ── SCREEN 3: Message ── -->
<div class="screen" id="screen3" style="display:none;">
  <div class="message-box">
    <p id="typed-text"><span id="cursor-span" class="cursor">|</span></p>
    <button id = "btn-yes" class="btn-yes" onclick="sayYes()">Em đồng ý 🧡</button>
  </div>
</div>

<!-- ── Celebration ── -->
<div id="celebration">
  <div class="celebration-card">
    <div class="big-emoji">💖</div>
    <h2>Cảm ơn em!</h2>
    <p>Anh hứa sẽ luôn ở bên cạnh em, yêu thương và trân trọng em mãi mãi. 💕</p>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
